<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mike Host</title>
    <link rel="stylesheet" href="StyleCadasto.css">
</head>
<body>
    <div class="main">
        <div class="left">
            <div class="column">
                <h1>Nova Conta</h1>
                <form action="">
                    <input type="text" placeholder="Nome completo" name="username" required>
                    <input type="email" placeholder="Digite seu email" name="email" required>
                    <input type="password" placeholder="Digite sua senha" name="password"  required>

                    <div class="terms">
                        <input type="checkbox" name="terms" required>
                        <label for="terms">Concordo com os termos
                    </div>

                    <input class="button-form" type="submit" value="Criar conta">
                    <p>Já possui uma conta? <a href="/PagLogin.html">Faça login.</a></p>
                </form>
                
                
            </div>

        </div>
        
        <div class="right">
            <img src="assets/info.png" alt="">

            <div class="text">
                <h1>Leve sua carreira ao <br> próximo nível.</h1>
                <p>Lorem ipsum dolor sit amet consectetur adipisicing elit. Reprehenderit vero omnis vitae, laboriosam dolorem error eligendi fuga maxime earum magnam ut dolore quibusdam, explicabo sint iste eveniet? Qui, ullam neque.</p>
            </div>
        </div>
    </div>
</body>
</html>
